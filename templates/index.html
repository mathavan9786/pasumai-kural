<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>Pasumai Kural | Dashboard</title>
    <style>
        body { background-color: #0d1b2a; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { background: #1b4332; padding: 20px; border-radius: 10px; text-align: center; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .card { background: #1b263b; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #415a77; }
        .stress-map { background: #1b263b; margin-top: 20px; padding: 20px; border-radius: 15px; }
        .plant-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .cell { height: 50px; border-radius: 5px; transition: background-color 0.5s ease; }
        .red { background: #ef233c; } .green { background: #52b788; } .orange { background: #ff9e00; }
        button { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; background: #415a77; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌿 பசுமை குரல் | Pasumai Kural</h1>
        <p>AI-Powered Plant Health Monitoring System</p>
    </div>

    <div class="grid-container">
        <div class="card">
            <h3>Plant Bio-Signal</h3>
            <h1 id="signal">--</h1>
            <button onclick="checkSignal()">Check Plant</button>
        </div>
        <div class="card">
            <h3>Tamil Voice Alert</h3>
            <button onclick="document.getElementById('alertSound').play()">🔊 Generate Alert</button>
            <audio id="alertSound" src="{{ url_for('static', filename='alert.mp3') }}"></audio>
        </div>
        <div class="card">
            <h3>Farm Statistics</h3>
            <p>Total: 24 | ✅ Healthy: 17 | ⚠️ Warning: 3 | 🚨 Critical: 0</p>
        </div>
    </div>

    <div class="stress-map">
        <h3>Precision Stress Map - Field View</h3>
        <div class="plant-grid" id="map"></div>
    </div>

    <script>
        // Init Map
        const map = document.getElementById('map');
        for(let i=0; i<15; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell green';
            map.appendChild(cell);
        }

        function checkSignal() {
            fetch('/signal').then(res => res.json()).then(data => {
                document.getElementById('signal').innerText = data.signal + "%";
            });
        }

        function updateMap() {
            fetch('/get_map_data').then(res => res.json()).then(data => {
                const cells = document.querySelectorAll('.cell');
                data.map.forEach((status, index) => {
                    cells[index].className = 'cell ' + (status === 0 ? 'red' : status === 1 ? 'green' : 'orange');
                });
            });
        }

        setInterval(updateMap, 5000); // Auto-update map every 5s
    </script>
</body>
</html>
