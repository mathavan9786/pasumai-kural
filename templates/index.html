<!DOCTYPE html>
<html>
<head>

<title>Pasumai Kural</title>

<style>

body{
background:#0b1c2c;
color:white;
font-family:Arial;
text-align:center;
}

.card{
background:#1c2f4a;
padding:20px;
margin:20px;
border-radius:10px;
display:inline-block;
width:250px;
}

button{
padding:10px;
background:green;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🌿 Pasumai Kural</h1>
<p>AI Powered Plant Health Monitoring System</p>

<div class="card">

<h3>Plant Bio Signal</h3>

<h1 id="signal">45%</h1>

<button onclick="checkPlant()">Check Plant</button>

</div>

<div class="card">

<h3>Tamil Voice Alert</h3>

<button onclick="playAlert()">Generate Alert</button>

<br><br>

<audio id="audio" src="/static/alert.mp3" controls></audio>

</div>

<div class="card">

<h3>Farm Statistics</h3>

<p>Total : <span id="total">24</span></p>
<p>Healthy : <span id="healthy">17</span></p>
<p>Warning : <span id="warning">3</span></p>
<p>Critical : <span id="critical">0</span></p>

<button onclick="refreshStats()">Refresh</button>

</div>

<script>

function checkPlant(){

fetch('/signal')
.then(res=>res.json())
.then(data=>{
document.getElementById("signal").innerText=data.signal+"%"
})

}

function refreshStats(){

fetch('/stats')
.then(res=>res.json())
.then(data=>{

document.getElementById("total").innerText=data.total
document.getElementById("healthy").innerText=data.healthy
document.getElementById("warning").innerText=data.warning
document.getElementById("critical").innerText=data.critical

})

}

function playAlert(){

document.getElementById("audio").play()

}

</script>

</body>
</html>
